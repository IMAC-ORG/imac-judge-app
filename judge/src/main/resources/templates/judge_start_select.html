<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
  <body>

    <div th:fragment="modal_select"  class="modal-content" style="padding-top: 5px; position: relative;">
        <style>
            /* Type selection buttons - clean bordered style */
            .type-btn {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 16px;
                border: 2px solid #424242;
                border-radius: 8px;
                background: #fafafa;
                margin: 5px;
                text-decoration: none;
                transition: all 0.2s ease;
            }
            .type-btn:hover {
                background: #fff9c4;
                border-color: #ff9800;
            }
            .type-btn.disabled {
                opacity: 0.4;
                pointer-events: none;
                background: #e0e0e0;
                border-color: #bdbdbd;
            }
            .type-btn-icon {
                font-size: 2rem;
                color: #424242;
            }
            .type-btn-label {
                font-size: 0.9rem;
                font-weight: 600;
                color: #212121;
                margin: 0 8px;
                white-space: nowrap;
            }
            .type-btn-round {
                font-size: 1.6rem;
                font-weight: 700;
                color: #1565c0;
                min-width: 35px;
                text-align: right;
            }
            @media only screen and (min-width: 601px) {
                .type-btn {
                    padding: 16px 24px;
                }
                .type-btn-icon {
                    font-size: 2.5rem;
                }
                .type-btn-label {
                    font-size: 1.1rem;
                }
                .type-btn-round {
                    font-size: 2rem;
                }
            }
            /* Battery warning indicator styles - only shown for warnings */
            .battery-status {
                display: none; /* Hidden by default */
                align-items: center;
                justify-content: center;
                padding: 10px 20px;
                border-radius: 8px;
                margin-bottom: 10px;
                font-weight: 700;
                border: 2px solid;
            }
            .battery-status i {
                margin-right: 10px;
                font-size: 2.2rem;
            }
            .battery-status .bat-text {
                font-size: 1.3rem;
                font-weight: 700;
            }
            .battery-mid {
                background-color: #fff3e0;
                color: #e65100;
                border-color: #ff9800;
            }
            .battery-low {
                background-color: #ffebee;
                color: #b71c1c;
                border-color: #f44336;
            }
            /* Incomplete round overlay - covers parent modal content */
            .incomplete-overlay {
                display: none;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(255,255,255,0.98);
                z-index: 100;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }
            .incomplete-overlay.active {
                display: flex;
            }
        </style>

        <!-- Battery Warning Indicator (updated via onOpenStart callback in pilot-list pages) -->
        <div class="battery-status"></div>

        <h5 th:text="${pilot.name}" style="font-size: 2.8rem; font-weight: 700; margin-bottom: 30px;">Judging Pilot</h5>
        <h6 class="black-text">SELECT ROUND DIRECTION & TYPE</h6>
        <form th:id="'judgeknown'+${pilot.index}" action="/judge" method="get">
            <input type="hidden" name="pilot_id" th:value="${pilot.primary_id}"/>
            <input type="hidden" th:id="'roundType'+${pilot.index}" name="roundType" value="KNOWN"/>
            <input type="hidden" th:id="'dirflip'+${pilot.index}" name="dirflip" value="false" />
            <input type="hidden" th:id="'sequenceType'+${pilot.index}" name="sequenceType" th:value="${comp.sequenceType}" />
            <div class="row">
                <div class="col s3"><a class="">
                    <i class="small material-icons">east</i>
                    <i class="small material-icons">east</i></a>
                </div>
                
                <div class="col s6 switch">
                    <label class="black-text" style="font-size: 12pt" th:for="'cb_dirflip'+${pilot.index}">
                    (B)
                    <input type="checkbox" th:id="'cb_dirflip'+${pilot.index}" 
                           th:onchange="'javascript:$(\'#dirflip'+${pilot.index}+'\').val(this.checked)'"/>
                    <span class="lever"></span>
                    (C)
                    </label>
                </div>
            
                <div class="col s3"><a class="">
                    <i class="small material-icons">west</i>
                    <i class="small material-icons">west</i></a>
                </div>
        
            </div>

            <h6 class="black-text" style="margin-top: 30px;">Touch to start judging</h6>

            <div class="row">
                <div class="col s4">
                    <a th:id="'act_known'+${pilot.index}" class="type-btn known-btn" href="#"
                       th:attr="data-pilot-idx=${pilot.index},data-pilot-id=${pilot.primary_id},data-max-sequences=${comp.sequences},data-active-sequence=${pilotScores[pilot.primary_id].activeSequence}">
                        <i class="material-icons type-btn-icon">visibility</i>
                        <span class="type-btn-label">KN</span>
                        <span class="type-btn-round" th:text="${pilotScores[pilot.primary_id].getActiveRound('KNOWN')}"></span>
                    </a>
                </div>

                <div class="col s4">
                    <a th:id="'act_unknown'+${pilot.index}" href="#"
                       th:class="${classesWithUnknown.contains(pilot.classString.toUpperCase())} ? 'type-btn' : 'type-btn disabled'"
                       th:onclick="${classesWithUnknown.contains(pilot.classString.toUpperCase())} ? 'javascript:$(\'#roundType'+${pilot.index}+'\').val(\'UNKNOWN\'); $(\'#judgeknown'+${pilot.index}+'\').submit();' : null">
                        <i class="material-icons type-btn-icon">visibility_off</i>
                        <span class="type-btn-label">UK</span>
                        <span class="type-btn-round" th:text="${pilotScores[pilot.primary_id].getActiveRound('UNKNOWN')}"></span>
                    </a>
                </div>

                <div class="col s4">
                    <a th:id="'act_freestyle'+${pilot.index}" href="#"
                       th:class="${hasFreestyle} ? 'type-btn' : 'type-btn disabled'"
                       th:onclick="${hasFreestyle} ? 'javascript:$(\'#roundType'+${pilot.index}+'\').val(\'FREESTYLE\'); $(\'#judgeknown'+${pilot.index}+'\').submit();' : null">
                        <i class="material-icons type-btn-icon">diversity_2</i>
                        <span class="type-btn-label">FS</span>
                        <span class="type-btn-round" th:text="${pilotScores[pilot.primary_id].getActiveRound('FREESTYLE')}"></span>
                    </a>
                </div>
            </div>

        </form>

        <!-- Incomplete KNOWN Round Warning Overlay -->
        <div th:id="'incomplete_overlay_'+${pilot.index}" class="incomplete-overlay">
            <h5 style="font-size: 1.6rem; font-weight: 700; margin: 0 0 15px 0; color: #e65100; text-align: center;">
                <i class="material-icons" style="vertical-align: middle; margin-right: 8px;">warning</i>Incomplete KNOWN Round
            </h5>
            <p style="font-size: 1.4rem; margin: 0 0 20px 0; line-height: 1.4; text-align: center;">
                Pilot has not yet flown
                <strong>Round <span th:text="${pilotScores[pilot.primary_id].getActiveRound('KNOWN')}"></span> Sequence 2</strong>
            </p>
            <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
                <a th:id="'btn_continue_seq2_'+${pilot.index}" href="#!"
                   class="waves-effect waves-light btn blue"
                   style="min-width: 240px; height: 48px; line-height: 48px; font-size: 1.2rem;">
                    Continue Seq 2
                </a>
                <a th:id="'btn_start_new_round_'+${pilot.index}" href="#!"
                   class="waves-effect waves-light btn green"
                   style="min-width: 240px; height: 48px; line-height: 48px; font-size: 1.2rem;">
                    Start New Round
                </a>
                <a th:id="'btn_exit_'+${pilot.index}" href="#!"
                   class="waves-effect waves-light btn red"
                   style="min-width: 240px; height: 48px; line-height: 48px; font-size: 1.2rem;">
                    Exit
                </a>
            </div>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/
            $(document).ready(function() {
                var pilotIdx = /*[[${pilot.index}]]*/ '0';
                var pilotId = /*[[${pilot.primary_id}]]*/ '';
                var maxSequences = /*[[${comp.sequences}]]*/ 2;
                var activeSequence = /*[[${pilotScores[pilot.primary_id].activeSequence}]]*/ 1;

                var overlay = $('#incomplete_overlay_' + pilotIdx);

                function showOverlay() {
                    overlay.addClass('active');
                }
                function hideOverlay() {
                    overlay.removeClass('active');
                }

                // Attach click handler to KNOWN button
                $('#act_known' + pilotIdx).on('click', function(e) {
                    e.preventDefault();
                    if (maxSequences === 2 && activeSequence === 2) {
                        showOverlay();
                    } else {
                        $('#judgeknown' + pilotIdx).submit();
                    }
                    return false;
                });

                // Button: Continue with Seq 2
                $('#btn_continue_seq2_' + pilotIdx).on('click', function(e) {
                    e.preventDefault();
                    hideOverlay();
                    $('#judgeknown' + pilotIdx).submit();
                });

                // Button: Start New Round
                $('#btn_start_new_round_' + pilotIdx).on('click', function(e) {
                    e.preventDefault();
                    hideOverlay();
                    $.ajax({
                        url: '/api/pilot/' + pilotId + '/advance-round?type=KNOWN',
                        method: 'POST',
                        success: function(response) {
                            var dirflip = $('#dirflip' + pilotIdx).val();
                            window.location.href = '/judge?pilot_id=' + pilotId +
                                                 '&roundType=KNOWN&dirflip=' + dirflip;
                        },
                        error: function(xhr, status, error) {
                            M.toast({
                                html: 'Error advancing round: ' + error,
                                classes: 'red',
                                displayLength: 4000
                            });
                        }
                    });
                });

                // Button: Exit
                $('#btn_exit_' + pilotIdx).on('click', function(e) {
                    e.preventDefault();
                    hideOverlay();
                });
            });
            /*]]>*/
        </script>
    </div>

  </body>
